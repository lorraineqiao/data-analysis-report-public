<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>使用记录</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 1200px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #4F46E5; color: white; }
    tr:hover { background: #f9f9f9; }
    .time { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>📊 使用记录</h1>
  <p>JSONBin ID: <code id="binId">加载中...</code></p>
  <table>
    <thead>
      <tr>
        <th>序号</th>
        <th>日期</th>
        <th>代理商名称</th>
        <th>渠道经理</th>
        <th>数据摘要</th>
      </tr>
    </thead>
    <tbody id="records">
      <tr><td colspan="5">加载中...</td></tr>
    </tbody>
  </table>

  <script>
    const BIN_ID = "69ef40c636566621a8f8198d";
    document.getElementById("binId").textContent = BIN_ID;

    async function loadRecords() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`);
        const data = await res.json();
        const records = data.record.records || [];
        
        document.getElementById("records").innerHTML = records.length === 0 
          ? '<tr><td colspan="5" style="text-align:center">暂无记录</td></tr>'
          : records.reverse().map((r, i) => `
              <tr>
                <td>${records.length - i}</td>
                <td>${r.date || '-'}</td>
                <td>${r.agentName || '-'}</td>
                <td>${r.channelManager || '-'}</td>
                <td>${r.summary || '-'}</td>
              </tr>
            `).join('');
      } catch (e) {
        document.getElementById("records").innerHTML = '<tr><td colspan="5" style="color:red">加载失败: ' + e.message + '</td></tr>';
      }
    }
    loadRecords();
    setInterval(loadRecords, 10000); // 每10秒自动刷新
  </script>
</body>
</html>
